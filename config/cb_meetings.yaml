# Central-bank meeting calendar (Phase 1).
#
# FOMC meetings (past + future ≥2y) with derivable realized outcomes.
# Past meeting dates are confirmed; realized outcome / magnitude is computed
# at runtime from FDTRMID_Index step changes around the meeting date (when
# rates_drivers/FDTRMID_Index.parquet is available).
#
# Future meeting dates are sourced from the Federal Reserve's published
# calendar (federalreserve.gov/monetarypolicy/fomccalendars.htm). Dates
# locked through 2027.
#
# This file is the SoT for FOMC awareness in:
#   - A4 Heitfield-Park (per-meeting probability vectors)
#   - A11-event Tier 1 (FOMC + statement)
#   - §3.7 FOMC blackouts on every plotly chart
#   - §3.7 Fed-dots-vs-OIS chart anchor dates
#
# Schema:
#   central_bank: FED  | ECB | BOE | BOJ | RBA | RBNZ | BOC | SNB
#   date: meeting date (YYYY-MM-DD)
#   has_sep: true if Summary of Economic Projections is published this meeting
#   statement_only: false → press conference; true → release-only meeting
#   blackout_start / blackout_end: pre/post communication blackout window
#     (FOMC blackout = "second Saturday before meeting" through "Thursday after")

fed:
  blackout_rule:
    pre_days: 12   # second Saturday before meeting
    post_days: 1   # Thursday after meeting

  meetings:
    # 2018 (SR3 launched May 2018)
    - {date: 2018-06-13, has_sep: true,  statement_only: false}
    - {date: 2018-08-01, has_sep: false, statement_only: true}
    - {date: 2018-09-26, has_sep: true,  statement_only: false}
